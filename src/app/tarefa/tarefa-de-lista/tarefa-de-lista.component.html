<li class="list-group-item" (mouseover)="hovered = true" (mouseleave)="hovered = false" [class.bg-secondary-subtle]="hovered">
  <div class="row align-items-center">
    <div class="col-auto">
      <input class="form-check-input" type="checkbox" [(ngModel)]="tarefa.isConcluida" [id]="indiceTarefa" (change)="checkarTarefa($event)">
    </div>
    <div class="col-auto ps-0">
      <i class="bi bi-flag-fill" [class]="flagColor"></i>
    </div>
    <div class="col flex-grow-1 p-0">
      <label class="form-check-label" [for]="indiceTarefa" [style.text-decoration]="tarefa.isConcluida ? 'line-through' : 'none'" [class.text-body-secondary]="tarefa.isConcluida">{{ tarefa.titulo }}</label>
    </div>
    <div class="col-auto">
      <i class="bi bi-x text-danger fs-4" (click)="emitirEventoExclusao()" style="cursor: pointer;"></i>
    </div>
  </div>
  <div class="row">
    <small class="text-body-secondary">{{ tarefa.dataCriacao | date }} — {{ tarefa.dataCriacao | diasDesde }} dias atrás</small>
    <small class="text-body-secondary">Prazo: {{ tarefa.prazo | date }}</small>
  </div>
</li>
