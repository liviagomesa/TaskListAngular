<div class="container py-3 py-md-4 py-lg-5" *ngIf="state$ | async as state">

  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-10 col-12">
      <h1 class="fw-bold text-body-emphasis mb-4 text-center">Tarefas cadastradas</h1>

      <form [formGroup]="filterSortForm">

        <!-- Campo de busca (a implementar) -->
        <!--div class="row mb-4">
          <div class="col-12">
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
              </span>
              <input
                type="text"
                class="form-control border-start-0 ps-0"
                placeholder="Buscar tarefas pelo título..."
                formControlName="busca"
              >
            </div>
          </div>
        </div-->

        <div class="row mb-4">
          <!-- Filtros -->
          <div class="col d-flex align-items-center">
            <i class="bi bi-filter-circle-fill pe-3 ps-1 fs-5 text-primary"></i>
            <div class="btn-group" role="group">
              <input type="radio" class="btn-check" id="todas" formControlName="concluida" [value]="undefined">
              <label class="btn btn-outline-primary" for="todas">Todas</label>

              <input type="radio" class="btn-check" id="pendentes" formControlName="concluida" [value]="false">
              <label class="btn btn-outline-primary" for="pendentes">Pendentes</label>

              <input type="radio" class="btn-check" id="concluidas" formControlName="concluida" [value]="true">
              <label class="btn btn-outline-primary" for="concluidas">Concluídas</label>
            </div>
          </div>
          <!-- Botão excluir concluídas -->
          <div class="col-auto">
            <button class="btn btn-danger" (click)="excluirConcluidas()" [disabled]="state.excluindoConcluidas">
              <span *ngIf="state.excluindoConcluidas" class="spinner-border spinner-border-sm me-1"></span>
              {{ state.excluindoConcluidas ? 'Excluindo...' : 'Excluir concluídas' }}
            </button>
          </div>
        </div>

        <div class="row mb-4">
          <!-- Opções de ordenação -->
          <div class="col d-flex align-items-center">
            <i class="bi bi-sort-up pe-3 ps-1 fs-5 text-primary"></i>
            <div class="btn-group" role="group">
              <input type="radio" class="btn-check" id="dataCriacao" formControlName="sort" value="dataCriacao">
              <label class="btn btn-outline-primary" for="dataCriacao">Data de criação</label>

              <input type="radio" class="btn-check" id="titulo" formControlName="sort" value="titulo">
              <label class="btn btn-outline-primary" for="titulo">Alfabética</label>

              <input type="radio" class="btn-check" id="prazo" formControlName="sort" value="prazo">
              <label class="btn btn-outline-primary" for="prazo">Prazo</label>
            </div>
          </div>
        </div>

      </form>

      <div *ngIf="state.loadingDados">⏳ Carregando tarefas...</div>
      <div *ngIf="state.errorDados">⚠️ Erro ao carregar dados. Recarregue a página para tentar novamente.</div>

      <ng-container *ngIf="!state.loadingDados && !state.errorDados">

        <ng-container *ngIf="state.lista.length > 0; else empty">
          <ul class="list-group">
            <app-tarefa-card
              *ngFor="let t of state.lista"
              [tarefa]="t"
              (excluida)="deleteById(t.id!)"
              (concluida)="toggleConclusao(t)">
            </app-tarefa-card>
          </ul>

          <!-- Cada async pipe inserido no html gera um subscribe/unsubscribe individual
          (ou seja, cada vez que aparece no template, será uma execução do método do http)
          Usamos "as dados" para conseguir chamar async pipe uma única vez e depois só referenciar a variável "dados". -->
          <div class="text-center mt-2" [class.text-success]="state.total !== 0 && state.concluidas === state.total">
              {{ state.concluidas }}/{{ state.total }} tarefa(s) concluída(s)
          </div>
        </ng-container>

        <ng-template #empty>
          <div>📭 Nenhuma tarefa encontrada.</div>
        </ng-template>

        <div class="text-center mt-2">
          <i class="bi bi-arrow-left-circle ms-1" (click)="incrementarPagina(-1)" style="cursor: pointer;"></i>
          Você está na página {{ state.page }}
          <i class="bi bi-arrow-right-circle ms-1" (click)="incrementarPagina(1)" style="cursor: pointer;"></i>
        </div>

      </ng-container>

    </div>
  </div>
</div>
